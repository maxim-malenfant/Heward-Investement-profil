<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heward — Questionnaire du profil d’investisseur</title>
  <style>
    :root {
      --bg: #0f1614;
      --bg-soft: #16201d;
      --surface: #111816;
      --surface-2: #18231f;
      --card: #f7f5ef;
      --card-2: #fbfaf6;
      --line: #d7d4ca;
      --line-strong: #b8b4a7;
      --text: #16211d;
      --text-soft: #48534e;
      --white: #ffffff;
      --brand: #4f6b5c;
      --brand-2: #6d8878;
      --brand-3: #dfe7e1;
      --accent: #b79a67;
      --success: #315c50;
      --danger: #8c3838;
      --shadow: 0 24px 60px rgba(0,0,0,0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(80rem 80rem at 8% -10%, rgba(109,136,120,0.22), transparent 35%),
        radial-gradient(80rem 80rem at 100% 0%, rgba(183,154,103,0.10), transparent 28%),
        linear-gradient(180deg, #0d1311 0%, #111816 100%);
      color: var(--white);
    }

    img { max-width: 100%; display: block; }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 18px 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 4px 2px 18px;
      color: rgba(255,255,255,0.86);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.05);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.45rem;
      letter-spacing: 0.06em;
    }

    .brand-wording { min-width: 0; }
    .brand-title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.5rem;
      letter-spacing: 0.16em;
      font-weight: 700;
    }

    .brand-sub {
      margin-top: 4px;
      font-size: 0.86rem;
      color: rgba(255,255,255,0.68);
      letter-spacing: 0.03em;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
    }

    .lang-switch-label {
      font-size: 0.84rem;
      color: rgba(255,255,255,0.80);
      padding-left: 8px;
      white-space: nowrap;
    }

    .lang-buttons {
      display: inline-flex;
      gap: 6px;
    }

    .lang-btn {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.88);
      padding: 10px 14px;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      transition: all .16s ease;
    }

    .lang-btn:hover { transform: translateY(-1px); }
    .lang-btn.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.14);
      color: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.14);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 36px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(79,107,92,0.95), rgba(17,24,22,0.96) 60%, rgba(17,24,22,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -100px -130px auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(183,154,103,0.20), transparent 66%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.88);
      font-size: 0.84rem;
      letter-spacing: 0.03em;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 12px;
      max-width: 860px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      line-height: 0.98;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero-lead {
      max-width: 800px;
      margin: 0;
      font-size: 1.06rem;
      line-height: 1.72;
      color: rgba(255,255,255,0.86);
    }

    .hero-meta {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .hero-stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px 18px;
      min-height: 86px;
    }

    .hero-stat-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.62);
      margin-bottom: 8px;
    }

    .hero-stat-value {
      font-size: 1.02rem;
      line-height: 1.45;
      color: rgba(255,255,255,0.92);
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 16px;
    }

    .sidebar-card,
    .content-card {
      background: rgba(247,245,239,0.98);
      color: var(--text);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .sidebar-card { padding: 22px; }
    .sidebar-title {
      margin: 0 0 12px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.35rem;
      line-height: 1.1;
    }

    .sidebar-copy {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: #e7e3d8;
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 10px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--accent));
      border-radius: 999px;
      transition: width .25s ease;
    }

    .progress-label {
      font-size: 0.9rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    .toc {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .toc a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid #ddd8ca;
      padding: 11px 12px;
      border-radius: 12px;
      background: #fcfbf8;
      font-size: 0.94rem;
      line-height: 1.35;
      transition: all .18s ease;
    }

    .toc a:hover {
      border-color: var(--brand-2);
      transform: translateY(-1px);
      background: #fff;
    }

    .content-card { padding: 26px; }

    .panel-intro {
      border: 1px solid #ddd9ce;
      background: linear-gradient(180deg, #fcfbf7 0%, #f7f4ec 100%);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .panel-intro h2 {
      margin: 0 0 10px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .panel-intro p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.72;
    }

    .section-card {
      border: 1px solid #ddd8ca;
      border-radius: 26px;
      padding: 22px;
      background: linear-gradient(180deg, #ffffff 0%, #faf8f2 100%);
      margin-bottom: 20px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid #ebe5d9;
      margin-bottom: 18px;
    }

    .section-kicker {
      color: var(--brand);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .section-title {
      margin: 0 0 10px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.9rem;
      line-height: 1.04;
    }

    .section-intro {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.78;
      max-width: 780px;
    }

    .section-badge {
      white-space: nowrap;
      border-radius: 999px;
      padding: 10px 13px;
      background: #edf2ef;
      color: var(--brand);
      font-size: 0.84rem;
      font-weight: 700;
      border: 1px solid #d5dfd8;
    }

    .question-card {
      border: 1px solid #e7e0d2;
      border-radius: 22px;
      padding: 20px;
      background: #fff;
      margin-bottom: 16px;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .question-card:focus-within {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 5px rgba(79,107,92,0.08);
    }

    .question-top {
      display: flex;
      gap: 14px;
      align-items: start;
      margin-bottom: 14px;
    }

    .question-number {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #e8eee9 0%, #dae4dd 100%);
      color: var(--brand);
      font-weight: 800;
      border: 1px solid #cfdacf;
    }

    .question-title {
      margin: 1px 0 0;
      font-size: 1.09rem;
      line-height: 1.55;
      font-weight: 700;
    }

    .question-media {
      margin: 14px 0 16px;
      padding: 14px;
      border: 1px solid #e5ded0;
      border-radius: 18px;
      background: #faf8f4;
    }

    .question-media img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      object-fit: contain;
      background: white;
    }

    .question-media figcaption {
      margin-top: 10px;
      color: var(--text-soft);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      position: relative;
    }

    .option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option label {
      display: flex;
      gap: 14px;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid #ddd7ca;
      background: #fcfbf8;
      cursor: pointer;
      transition: all .18s ease;
      line-height: 1.6;
    }

    .option label:hover {
      background: #fff;
      border-color: #c7d3cb;
      transform: translateY(-1px);
    }

    .option input[type="radio"]:checked + label {
      border-color: var(--brand);
      background: linear-gradient(180deg, #f4f7f4 0%, #eef4f0 100%);
      box-shadow: 0 0 0 4px rgba(79,107,92,0.08);
    }

    .dot {
      width: 19px;
      height: 19px;
      min-width: 19px;
      border-radius: 50%;
      border: 2px solid #a7b6ae;
      margin-top: 3px;
      position: relative;
      background: white;
      transition: all .18s ease;
    }

    .option input[type="radio"]:checked + label .dot {
      border-color: var(--brand);
      background: radial-gradient(circle at center, var(--brand) 0 48%, white 49%);
    }

    .option-text {
      flex: 1;
      font-size: 0.97rem;
      color: var(--text);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
      padding: 14px 18px;
      border-radius: 999px;
      transition: transform .16s ease, opacity .16s ease, background .16s ease, border-color .16s ease;
      font-weight: 700;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand), #42584c);
      color: white;
    }

    .btn-secondary {
      background: #f3f0e8;
      color: var(--text);
      border: 1px solid #d8d1c1;
    }

    .warning {
      display: none;
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fff3f3;
      color: var(--danger);
      border: 1px solid #e8c8c8;
      line-height: 1.55;
    }

    .warning.visible { display: block; }

    .result {
      display: none;
      margin-top: 24px;
      border-top: 1px solid #e6dece;
      padding-top: 24px;
    }

    .result.visible { display: block; }

    .result-header {
      border-radius: 24px;
      padding: 24px;
      background: linear-gradient(135deg, #17322c 0%, #24453c 54%, #49685b 100%);
      color: white;
      box-shadow: 0 18px 40px rgba(0,0,0,0.16);
    }

    .result-kicker {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .result-header h3 {
      margin: 0 0 10px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
    }

    .result-header p {
      margin: 0;
      max-width: 760px;
      color: rgba(255,255,255,0.86);
      line-height: 1.72;
      font-size: 1rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .metric {
      border: 1px solid #e1dbce;
      border-radius: 18px;
      padding: 16px;
      background: #fbfaf6;
    }

    .metric-label {
      color: var(--text-soft);
      font-size: 0.85rem;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .metric-value {
      font-size: 1.04rem;
      font-weight: 800;
      line-height: 1.45;
      color: var(--text);
    }

    .method-note {
      margin-top: 14px;
      border-radius: 18px;
      padding: 16px 18px;
      background: #f3efe6;
      border: 1px dashed #d3cbba;
      color: var(--text);
      line-height: 1.68;
    }

    .footnote {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,0.62);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    @media (max-width: 1020px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }

    @media (max-width: 760px) {
      .page { padding: 18px 12px 54px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .lang-switch { justify-content: space-between; }
      .hero { padding: 24px; border-radius: 24px; }
      .content-card, .sidebar-card { border-radius: 22px; }
      .content-card { padding: 18px; }
      .section-card { padding: 16px; border-radius: 20px; }
      .section-head { flex-direction: column; }
      .hero-meta, .result-grid { grid-template-columns: 1fr; }
      .question-card { padding: 16px; }
      .brand-title { font-size: 1.3rem; }
      .topbar { padding-bottom: 12px; }
    }

    @media print {
      body { background: white; }
      .page { max-width: 100%; padding: 0; }
      .topbar, .sidebar, .actions, .footnote { display: none !important; }
      .hero, .content-card, .section-card, .result-header { box-shadow: none; border: 1px solid #ccc; }
      .hero { color: black; background: white; }
      .result { display: block !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div class="brand-wording">
          <p class="brand-title">HEWARD</p>
          <div class="brand-sub" id="brandSub"></div>
        </div>
      </div>

      <div class="lang-switch" aria-label="Language switcher">
        <span class="lang-switch-label" id="languageLabel"></span>
        <div class="lang-buttons">
          <button type="button" class="lang-btn active" data-lang="fr">Français</button>
          <button type="button" class="lang-btn" data-lang="en">English</button>
        </div>
      </div>
    </div>

    <section class="hero">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="heroTitle"></h1>
      <p class="hero-lead" id="heroLead"></p>

      <div class="hero-meta">
        <div class="hero-stat">
          <div class="hero-stat-label" id="heroUsageLabel"></div>
          <div class="hero-stat-value" id="heroUsageValue"></div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label" id="heroStructureLabel"></div>
          <div class="hero-stat-value" id="heroStructureValue"></div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label" id="heroResultLabel"></div>
          <div class="hero-stat-value" id="heroResultValue"></div>
        </div>
      </div>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-card">
          <h2 class="sidebar-title" id="sidebarProgressTitle"></h2>
          <p class="sidebar-copy" id="sidebarProgressCopy"></p>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="progress-label"><span id="progressCount">0</span> <span id="progressSuffix"></span></div>
        </div>

        <div class="sidebar-card">
          <h2 class="sidebar-title" id="sidebarSectionsTitle"></h2>
          <div class="toc" id="toc"></div>
        </div>
      </aside>

      <main class="content-card">
        <div class="panel-intro">
          <h2 id="panelTitle"></h2>
          <p id="panelBody"></p>
        </div>

        <div id="warning" class="warning"></div>
        <form id="quizForm"></form>

        <div class="actions">
          <button type="button" class="btn-primary" id="calculateBtn"></button>
          <button type="button" class="btn-secondary" id="resetBtn"></button>
          <button type="button" class="btn-secondary" id="printBtn"></button>
        </div>

        <section id="result" class="result" aria-live="polite">
          <div class="result-header">
            <div class="result-kicker" id="resultKicker"></div>
            <h3 id="finalProfileLabel"></h3>
            <p id="finalProfileDesc"></p>
          </div>

          <div class="result-grid">
            <div class="metric">
              <div class="metric-label" id="labelMetricHorizon"></div>
              <div class="metric-value" id="metricHorizon"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricKnowledge"></div>
              <div class="metric-value" id="metricKnowledge"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricObjective"></div>
              <div class="metric-value" id="metricObjective"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricCapacity"></div>
              <div class="metric-value" id="metricCapacity"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricTolerance"></div>
              <div class="metric-value" id="metricTolerance"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricCapacityTotal"></div>
              <div class="metric-value" id="capacityTotal"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricToleranceTotal"></div>
              <div class="metric-value" id="toleranceTotal"></div>
            </div>
            <div class="metric">
              <div class="metric-label" id="labelMetricLimiting"></div>
              <div class="metric-value" id="limitingFactors"></div>
            </div>
          </div>

          <div class="method-note" id="methodNote"></div>
        </section>
      </main>
    </div>

    <div class="footnote" id="footnote"></div>
  </div>

  <script>

tifs de placement", "metricCapacity": "Capacité à prendre des risques (Q4 à Q9)", "metricTolerance": "Tolérance au risque (Q10 à Q15)", "metricCapacityTotal": "Total capacité", "metricToleranceTotal": "Total tolérance", "metricLimiting": "Facteur(s) limitatif(s)", "pointsSuffix": "points", "methodNote": "<strong>Méthodologie.</strong> Le profil final retient la colonne la plus à gauche du barème, donc le niveau le plus prudent parmi les cinq blocs d’évaluation : horizon, connaissances, objectifs, capacité à prendre des risques et tolérance au risque.", "footnote": "Fichier HTML autonome, prêt à être hébergé gratuitement sur GitHub Pages, Netlify ou Cloudflare Pages.", "profileLabels": {"1": "Très prudent", "2": "Prudent", "3": "Équilibré", "4": "Croissance", "5": "Croissance dynamique"}, "profileDescriptions": {"1": "Profil axé sur la préservation du capital, avec une sensibilité élevée aux pertes et une préférence marquée pour des placements prudents.", "2": "Profil orienté vers la prudence, acceptant un niveau de risque limité afin de viser un rendement modéré et contrôlé.", "3": "Profil recherchant un équilibre entre stabilité, revenu et croissance, avec une acceptation mesurée du risque.", "4": "Profil orienté vers la croissance à long terme, prêt à accepter des fluctuations plus soutenues pour obtenir un potentiel de rendement supérieur.", "5": "Profil visant une croissance élevée, avec une tolérance importante à la volatilité et aux pertes à court terme."}}, "en": {"htmlLang": "en", "siteTitle": "Heward — Investor Profile Questionnaire", "brandSub": "Investment Management", "languageLabel": "Language", "eyebrow": "Confidential questionnaire • Private clients • $50M+", "heroTitle": "Investor Profile Questionnaire", "heroLead": "A bilingual corporate version designed for a refined, discreet, premium experience. The questionnaire preserves the 15 questions and scoring logic provided, then determines the final profile by retaining the most conservative limiting factor.", "heroUsageLabel": "Use", "heroUsageValue": "Starting point for a suitability and mandate discussion.", "heroStructureLabel": "Structure", "heroStructureValue": "15 questions across horizon, knowledge, objectives, capacity, and tolerance.", "heroResultLabel": "Outcome", "heroResultValue": "Very conservative, Conservative, Balanced, Growth, or Aggressive growth.", "sidebarProgressTitle": "Progress", "sidebarProgressCopy": "The questionnaire is completed on a single page. Progress and scoring are updated locally in the browser.", "progressAnsweredSuffix": "/ 15 answers completed", "sidebarSectionsTitle": "Sections", "panelTitle": "Use framework", "panelBody": "This questionnaire is presented in a clean format suited to a private wealth relationship. It is intended to structure the investor profile discussion and does not replace the advisor’s full analysis or the final suitability review.", "sectionKicker": "Section", "questionWordSingular": "question", "questionWordPlural": "questions", "calculateBtn": "Calculate profile", "resetBtn": "Reset", "printBtn": "Print result", "warningIncomplete": "Please answer all questions before calculating the profile. Missing questions: {missing}.", "resultKicker": "Final profile", "metricHorizon": "Investment horizon", "metricKnowledge": "Investment knowledge", "metricObjective": "Investment objectives", "metricCapacity": "Risk capacity (Q4 to Q9)", "metricTolerance": "Risk tolerance (Q10 to Q15)", "metricCapacityTotal": "Capacity total", "metricToleranceTotal": "Tolerance total", "metricLimiting": "Limiting factor(s)", "pointsSuffix": "points", "methodNote": "<strong>Methodology.</strong> The final profile uses the leftmost column of the scoring grid, meaning the most conservative level among the five assessment blocks: horizon, knowledge, objectives, risk capacity, and risk tolerance.", "footnote": "Standalone HTML file, ready for free hosting on GitHub Pages, Netlify, or Cloudflare Pages.", "profileLabels": {"1": "Very conservative", "2": "Conservative", "3": "Balanced", "4": "Growth", "5": "Aggressive growth"}, "profileDescriptions": {"1": "Profile focused on capital preservation, with high sensitivity to losses and a strong preference for conservative investments.", "2": "Profile oriented toward prudence, accepting limited risk in pursuit of moderate and controlled returns.", "3": "Profile seeking a balance between stability, income, and growth, with measured acceptance of risk.", "4": "Profile oriented toward long-term growth, prepared to accept more meaningful fluctuations for higher return potential.", "5": "Profile targeting high growth, with a strong tolerance for volatility and short-term losses."}}};
    const sections = [{"id": "horizon", "title": {"fr": "Horizon de placement", "en": "Investment horizon"}, "intro": {"fr": "La durée de votre horizon de placement a une incidence sur les types de placements qui pourraient vous convenir. Les investisseurs ayant un horizon de placement de plus de trois ans disposent d’une plus grande souplesse pour constituer un portefeuille (même s’il faut aussi tenir compte de la tolérance au risque et des objectifs de placement). Si votre horizon de placement est très court, les seules options qui vous conviennent pourraient être des placements prudents, comme les CPG et les fonds du marché monétaire.", "en": "The length of your investment horizon affects the types of investments that may be appropriate for you. Investors with a horizon of more than three years generally have greater flexibility in building a portfolio, although risk tolerance and investment objectives must also be considered. If your investment horizon is very short, only conservative options may be appropriate, such as GICs and money market funds."}}, {"id": "knowledge", "title": {"fr": "Connaissance des placements", "en": "Investment knowledge"}, "intro": {"fr": "Si vous avez de solides connaissances en matière de placement, vous comprenez bien le risque lié à divers types de placements et le rapport qui existe entre le degré de risque et le rendement potentiel. Si vos connaissances en matière de placement et à l’égard des marchés financiers sont limitées, les stratégies et les placements spéculatifs et à risque élevé ne sont probablement pas des options qui vous conviennent.", "en": "If you have a strong knowledge of investments, you understand the risks associated with different types of investments and the relationship between risk and potential return. If your knowledge of investing and financial markets is limited, speculative and high-risk strategies and investments are likely not suitable options for you."}}, {"id": "objective", "title": {"fr": "Objectifs de placement", "en": "Investment objectives"}, "intro": {"fr": "Les objectifs de placement représentent le but ou le résultat que vous voulez atteindre grâce à vos placements. La compréhension de vos objectifs de placement permet de déterminer les types de placements qui sont les mieux adaptés à vos besoins. Les produits de placement utilisés pour atteindre différents objectifs comportent des degrés de risque et un rendement potentiel variés.", "en": "Investment objectives represent the goal or outcome you want to achieve through your investments. Understanding your investment objectives helps determine which types of investments are best suited to your needs. Investment products used to achieve different objectives involve varying levels of risk and potential return."}}, {"id": "capacity", "title": {"fr": "Capacité à prendre des risques", "en": "Risk capacity"}, "intro": {"fr": "Votre situation financière dont vos actifs, vos dettes ainsi que le montant et la stabilité de votre revenu sont tous importants pour déterminer le degré de risque que vous pouvez assumer à l’égard de vos placements. En outre, plus la part du montant total de vos actifs que vous investissez est élevée, plus vous devriez faire preuve de prudence avec cette portion de votre portefeuille.", "en": "Your financial situation, including your assets, liabilities, and the amount and stability of your income, is important in determining how much risk you can assume with your investments. In addition, the greater the share of your total assets that this investment represents, the more cautious you should be with that portion of your portfolio."}}, {"id": "tolerance", "title": {"fr": "Tolérance au risque", "en": "Risk tolerance"}, "intro": {"fr": "Votre degré de tolérance au risque est important pour déterminer si vous devriez investir avec prudence ou audace. En général, il faut envisager de prendre plus de risques pour obtenir un rendement plus élevé. Si vous décidez de cibler ce rendement potentiellement plus élevé, vous risquez de subir des pertes plus lourdes.", "en": "Your degree of risk tolerance is important in determining whether you should invest conservatively or more aggressively. In general, higher returns require taking more risk. If you choose to pursue a potentially higher return, you may also experience larger losses."}}];

    let currentLang = "fr";
    let answerState = {};
    let resultState = null;

    const quizForm = document.getElementById("quizForm");
    const warning = document.getElementById("warning");
    const result = document.getElementById("result");
    const progressBar = document.getElementById("progressBar");
    const progressCount = document.getElementById("progressCount");
    const toc = document.getElementById("toc");

    function t() {
      return content[currentLang];
    }

    function profileLabel(value) {
      return t().profileLabels[String(value)];
    }

    function profileDescription(value) {
      return t().profileDescriptions[String(value)];
    }

    function setStaticContent() {
      const tr = t();
      document.documentElement.lang = tr.htmlLang;
      document.title = tr.siteTitle;
      document.getElementById("brandSub").textContent = tr.brandSub;
      document.getElementById("languageLabel").textContent = tr.languageLabel;
      document.getElementById("eyebrow").textContent = tr.eyebrow;
      document.getElementById("heroTitle").textContent = tr.heroTitle;
      document.getElementById("heroLead").textContent = tr.heroLead;
      document.getElementById("heroUsageLabel").textContent = tr.heroUsageLabel;
      document.getElementById("heroUsageValue").textContent = tr.heroUsageValue;
      document.getElementById("heroStructureLabel").textContent = tr.heroStructureLabel;
      document.getElementById("heroStructureValue").textContent = tr.heroStructureValue;
      document.getElementById("heroResultLabel").textContent = tr.heroResultLabel;
      document.getElementById("heroResultValue").textContent = tr.heroResultValue;
      document.getElementById("sidebarProgressTitle").textContent = tr.sidebarProgressTitle;
      document.getElementById("sidebarProgressCopy").textContent = tr.sidebarProgressCopy;
      document.getElementById("progressSuffix").textContent = tr.progressAnsweredSuffix;
      document.getElementById("sidebarSectionsTitle").textContent = tr.sidebarSectionsTitle;
      document.getElementById("panelTitle").textContent = tr.panelTitle;
      document.getElementById("panelBody").textContent = tr.panelBody;
      document.getElementById("calculateBtn").textContent = tr.calculateBtn;
      document.getElementById("resetBtn").textContent = tr.resetBtn;
      document.getElementById("printBtn").textContent = tr.printBtn;
      document.getElementById("resultKicker").textContent = tr.resultKicker;
      document.getElementById("labelMetricHorizon").textContent = tr.metricHorizon;
      document.getElementById("labelMetricKnowledge").textContent = tr.metricKnowledge;
      document.getElementById("labelMetricObjective").textContent = tr.metricObjective;
      document.getElementById("labelMetricCapacity").textContent = tr.metricCapacity;
      document.getElementById("labelMetricTolerance").textContent = tr.metricTolerance;
      document.getElementById("labelMetricCapacityTotal").textContent = tr.metricCapacityTotal;
      document.getElementById("labelMetricToleranceTotal").textContent = tr.metricToleranceTotal;
      document.getElementById("labelMetricLimiting").textContent = tr.metricLimiting;
      document.getElementById("methodNote").innerHTML = tr.methodNote;
      document.getElementById("footnote").textContent = tr.footnote;

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === currentLang);
      });
    }

    function getLocalizedText(value) {
      if (typeof value === "string") return value;
      if (value && typeof value === "object") return value[currentLang] || value.fr || value.en || "";
      return "";
    }

    function renderTOC() {
      const tr = t();
      toc.innerHTML = sections.map((section) => {
        const count = questions.filter(q => q.section === section.id).length;
        const questionWord = count > 1 ? tr.questionWordPlural : tr.questionWordSingular;
        return `<a href="#section-${section.id}">${getLocalizedText(section.title)} · ${count} ${questionWord}</a>`;
      }).join("");
    }

    function renderQuestions() {
      const tr = t();

      quizForm.innerHTML = sections.map((section) => {
        const sectionQuestions = questions.filter(q => q.section === section.id);
        const sectionCountLabel = `${sectionQuestions.length} ${sectionQuestions.length > 1 ? tr.questionWordPlural : tr.questionWordSingular}`;

        return `
          <section class="section-card" id="section-${section.id}">
            <div class="section-head">
              <div>
                <div class="section-kicker">${tr.sectionKicker}</div>
                <h2 class="section-title">${getLocalizedText(section.title)}</h2>
                <p class="section-intro">${getLocalizedText(section.intro)}</p>
              </div>
              <div class="section-badge">${sectionCountLabel}</div>
            </div>

            ${sectionQuestions.map((q) => `
              <article class="question-card" id="question-card-${q.id}">
                <div class="question-top">
                  <div class="question-number">${q.id}</div>
                  <h3 class="question-title">${getLocalizedText(q.title)}</h3>
                </div>

                ${q.image ? `
                  <figure class="question-media">
                    <img src="${q.image}" alt="${currentLang === "fr" ? "Illustration liée à la question " : "Illustration related to question "}${q.id}" />
                    ${q.caption ? `<figcaption>${getLocalizedText(q.caption)}</figcaption>` : ""}
                  </figure>
                ` : ""}

                <div class="options">
                  ${q.options.map((option, index) => {
                    const value = option.profile !== undefined ? option.profile : option.points;
                    const checked = Number(answerState[q.id]) === Number(value) ? "checked" : "";
                    return `
                      <div class="option">
                        <input
                          type="radio"
                          name="q${q.id}"
                          id="q${q.id}_${index}"
                          value="${value}"
                          ${checked}
                        />
                        <label for="q${q.id}_${index}">
                          <span class="dot" aria-hidden="true"></span>
                          <span class="option-text">${getLocalizedText(option.label)}</span>
                        </label>
                      </div>
                    `;
                  }).join("")}
                </div>
              </article>
            `).join("")}
          </section>
        `;
      }).join("");

      quizForm.querySelectorAll('input[type="radio"]').forEach((input) => {
        input.addEventListener("change", (event) => {
          const questionId = Number(event.target.name.replace("q", ""));
          answerState[questionId] = Number(event.target.value);
          updateProgress();
        });
      });
    }

    function getSelectedValue(questionId) {
      if (answerState[questionId] !== undefined && answerState[questionId] !== null) {
        return Number(answerState[questionId]);
      }
      const input = document.querySelector(`input[name="q${questionId}"]:checked`);
      return input ? Number(input.value) : null;
    }

    function getAnsweredCount() {
      return questions.filter(q => getSelectedValue(q.id) !== null).length;
    }

    function updateProgress() {
      const answered = getAnsweredCount();
      const percent = (answered / questions.length) * 100;
      progressCount.textContent = answered;
      progressBar.style.width = `${percent}%`;
    }

    function getMissingQuestions() {
      return questions.filter(q => getSelectedValue(q.id) === null).map(q => q.id);
    }

    function profileFromCapacity(total) {
      if (total < 15) return 2;
      if (total <= 25) return 3;
      if (total <= 40) return 4;
      return 5;
    }

    function profileFromTolerance(total) {
      if (total < 20) return 1;
      if (total <= 24) return 2;
      if (total <= 30) return 3;
      if (total <= 45) return 4;
      return 5;
    }

    function showWarning(message) {
      warning.textContent = message;
      warning.classList.add("visible");
    }

    function clearWarning() {
      warning.textContent = "";
      warning.classList.remove("visible");
    }

    function renderResult() {
      if (!resultState) {
        result.classList.remove("visible");
        return;
      }

      const tr = t();
      document.getElementById("finalProfileLabel").textContent = profileLabel(resultState.finalProfileValue);
      document.getElementById("finalProfileDesc").textContent = profileDescription(resultState.finalProfileValue);
      document.getElementById("metricHorizon").textContent = profileLabel(resultState.horizonProfile);
      document.getElementById("metricKnowledge").textContent = profileLabel(resultState.knowledgeProfile);
      document.getElementById("metricObjective").textContent = profileLabel(resultState.objectiveProfile);
      document.getElementById("metricCapacity").textContent = profileLabel(resultState.capacityProfile);
      document.getElementById("metricTolerance").textContent = profileLabel(resultState.toleranceProfile);
      document.getElementById("capacityTotal").textContent = `${resultState.capacityTotalValue} ${tr.pointsSuffix}`;
      document.getElementById("toleranceTotal").textContent = `${resultState.toleranceTotalValue} ${tr.pointsSuffix}`;
      document.getElementById("limitingFactors").textContent = resultState.limitingKeys.map((key) => tr[key]).join(", ");
      result.classList.add("visible");
    }

    function calculateProfile(scrollToResult = true) {
      const missing = getMissingQuestions();
      if (missing.length) {
        showWarning(t().warningIncomplete.replace("{missing}", missing.join(", ")));
        resultState = null;
        result.classList.remove("visible");
        document.getElementById(`question-card-${missing[0]}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
        return false;
      }

      clearWarning();

      const horizonProfile = getSelectedValue(1);
      const knowledgeProfile = getSelectedValue(2);
      const objectiveProfile = getSelectedValue(3);

      let capacityTotalValue = 0;
      for (let i = 4; i <= 9; i++) capacityTotalValue += getSelectedValue(i);

      let toleranceTotalValue = 0;
      for (let i = 10; i <= 15; i++) toleranceTotalValue += getSelectedValue(i);

      const capacityProfile = profileFromCapacity(capacityTotalValue);
      const toleranceProfile = profileFromTolerance(toleranceTotalValue);

      const components = [
        { key: "metricHorizon", profile: horizonProfile },
        { key: "metricKnowledge", profile: knowledgeProfile },
        { key: "metricObjective", profile: objectiveProfile },
        { key: "metricCapacity", profile: capacityProfile },
        { key: "metricTolerance", profile: toleranceProfile }
      ];

      const finalProfileValue = Math.min(...components.map(c => c.profile));
      const limitingKeys = components.filter(c => c.profile === finalProfileValue).map(c => c.key);

      resultState = {
        horizonProfile,
        knowledgeProfile,
        objectiveProfile,
        capacityProfile,
        toleranceProfile,
        capacityTotalValue,
        toleranceTotalValue,
        finalProfileValue,
        limitingKeys
      };

      renderResult();

      if (scrollToResult) {
        result.scrollIntoView({ behavior: "smooth", block: "start" });
      }
      return true;
    }

    function resetForm() {
      answerState = {};
      resultState = null;
      quizForm.reset();
      clearWarning();
      result.classList.remove("visible");
      renderQuestions();
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setLanguage(lang) {
      currentLang = lang;
      setStaticContent();
      renderTOC();
      renderQuestions();
      updateProgress();
      if (warning.classList.contains("visible")) {
        const missing = getMissingQuestions();
        if (missing.length) {
          warning.textContent = t().warningIncomplete.replace("{missing}", missing.join(", "));
        } else {
          clearWarning();
        }
      }
      renderResult();
    }

    document.getElementById("calculateBtn").addEventListener("click", () => calculateProfile(true));
    document.getElementById("resetBtn").addEventListener("click", resetForm);
    document.getElementById("printBtn").addEventListener("click", () => {
      const ok = calculateProfile(false);
      if (ok) window.print();
    });

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        setLanguage(btn.dataset.lang);
      });
    });

    setLanguage("fr");
  </script>
</body>
</html>
